<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>நண்பர்கள் கிஃப்ட் குலுக்கல் 🎁</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        h2 { color: #d63384; margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #d63384;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #a82465; }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            display: none;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            border: 1px solid #ffeeba;
        }
        .error { color: red; font-size: 14px; margin-top: 5px; }
        .locked-msg { color: #666; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎁 Secret Gift 🎁</h2>
    
    <div id="inputSection">
        <p>உங்க பெயரை கீழே டைப் பண்ணுங்க:</p>
        <input type="text" id="nameInput" placeholder="உங்க பெயர் (Ex: Rakshana)">
        <br>
        <button onclick="findMyPair()">யார் என் ஜோடி?</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <div id="resultSection" class="result">
        <p>ஹாய் <span id="userNameDisplay" style="color:#d63384;"></span>! 👋</p>
        <hr>
        <p>நீங்க கிஃப்ட் 🎁 வாங்கி கொடுக்க வேண்டிய ஆள்:</p>
        <h1 id="targetName" style="color:#28a745;"></h1>
        <p class="locked-msg">⚠️ குறிப்பு: இந்த ரிசல்ட் உங்களுக்கு மட்டும் தான் தெரியும்.</p>
    </div>
</div>

<script>
    // 1. பெயர் பட்டியல் மற்றும் ஜோடிகள் (Hardcoded Chain)
    // இது ஒரு வட்டம் போல: Rakshana -> Ramsi, Ramsi -> Rasmi... கடைசி ஆள் -> Rakshana
    const data = {
        "rakshana": "Ramsi",
        "ramsi": "Rasmi",
        "rasmi": "Afeela",
        "afeela": "Sumaiya",
        "sumaiya": "Aysha",
        "aysha": "Aisama",
        "aisama": "Baby",
        "baby": "Vahidha",
        "vahidha": "Aafila",
        "aafila": "Suppana",
        "suppana": "Fathima",
        "fathima": "Rakshana"
    };

    // சரியான பெயர்களின் பட்டியல் (For Matching)
    const validNames = Object.keys(data);

    // Page Load ஆகும்போது செக் செய்தல்
    window.onload = function() {
        const savedName = localStorage.getItem('secretSantaUser');
        if (savedName) {
            showResult(savedName, data[savedName]);
        }
    };

    function findMyPair() {
        let input = document.getElementById("nameInput").value.trim().toLowerCase();
        let errorMsg = document.getElementById("errorMsg");
        
        if (input.length < 3) {
            errorMsg.innerText = "பெயரை சரியாக டைப் செய்யவும்!";
            return;
        }

        // Fuzzy Matching (எழுத்து பிழை இருந்தாலும் கண்டுபிடித்தல்)
        let matchedName = getClosestName(input);

        if (matchedName) {
            // LocalStorage Check (ஏற்கனவே லாக் ஆகியிருக்கா?)
            const savedName = localStorage.getItem('secretSantaUser');
            if (savedName && savedName !== matchedName) {
                errorMsg.innerText = "சாரி! இந்த போனில் ஏற்கனவே வேறொருவர் லாகின் செய்துவிட்டார்.";
                return;
            }

            // Save and Show
            localStorage.setItem('secretSantaUser', matchedName);
            showResult(matchedName, data[matchedName]);
        } else {
            errorMsg.innerText = "மன்னிக்கவும், உங்கள் பெயர் லிஸ்டில் இல்லை. ஸ்பெல்லிங் செக் பண்ணுங்க.";
        }
    }

    function showResult(user, target) {
        document.getElementById("inputSection").style.display = "none";
        document.getElementById("resultSection").style.display = "block";
        
        // பெயரை முதல் எழுத்து கேப்பிட்டல் ஆக்குதல்
        let formattedUser = user.charAt(0).toUpperCase() + user.slice(1);
        
        document.getElementById("userNameDisplay").innerText = formattedUser;
        document.getElementById("targetName").innerText = target;
    }

    // எழுத்து பிழையை சரி செய்யும் எளிய பங்க்ஷன்
    function getClosestName(input) {
        // 1. நேரடி பொருத்தம் (Exact Match)
        if (validNames.includes(input)) return input;

        // 2. பகுதி பொருத்தம் (Contains) - எ.கா: "Aish" -> "Aysha" (கொஞ்சம் ரிஸ்க், ஆனால் லிஸ்ட் சின்னது என்பதால் ஓகே)
        // சிறந்தது: முதல் 3 எழுத்து பொருந்துகிறதா என பார்ப்பது
        for (let name of validNames) {
            if (name.startsWith(input.substring(0, 3))) {
                return name;
            }
        }

        // 3. எழுத்து ஒற்றுமை (Simple Character Overlap)
        // எ.கா: "Somaiya" vs "Sumaiya"
        for (let name of validNames) {
            let matchCount = 0;
            let minLength = Math.min(input.length, name.length);
            for (let i = 0; i < minLength; i++) {
                if (input[i] === name[i]) matchCount++;
            }
            // 70% எழுத்துக்கள் அமைந்தால் ஓகே சொல்லலாம்
            if (matchCount / name.length > 0.6) {
                return name;
            }
        }

        return null; // எதுவுமே பொருந்தவில்லை என்றால்
    }
</script>

</body>
</html>
